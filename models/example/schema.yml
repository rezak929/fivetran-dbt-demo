version: 2

models:
  - name: film_revenue_performance
    description: "Film revenue performance combining Pagila film, inventory, rental and payment data"
    columns:
      - name: FILM_ID
        description: "Primary key"
      - name: TITLE
        description: "Film title"
      - name: TOTAL_REVENUE
        description: "Total revenue generated by this film"
      - name: TOTAL_RENTALS
        description: "Total number of rentals"
      - name: ROI_PCT
        description: "Return on investment vs replacement cost"
